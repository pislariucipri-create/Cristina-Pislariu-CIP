    <style>
        .admin-container { padding: 4rem 10%; }
        .form-card { 
            background: white; padding: 2rem; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 3rem;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .patient-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .patient-card { 
            background: white; padding: 1.5rem; border-radius: 15px; 
            border-left: 5px solid var(--verde-sage); box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            position: relative; transition: 0.3s;
        }
        .patient-card:hover { transform: translateY(-5px); }
        .profile-section { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: #f0f0f0; overflow: hidden; border: 2px solid var(--verde-sage);
            cursor: pointer; position: relative; flex-shrink: 0;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .patient-card h3 { margin: 0; color: var(--text-maro-inchis); font-size: 1.2rem; }
        .info-row { font-size: 0.85rem; margin-top: 5px; color: #666; }
        .pass-display { color: #d68100; font-weight: bold; background: #fff8e1; padding: 2px 6px; border-radius: 4px; }
        .btn-delete-profile {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; color: #ffab91;
            cursor: pointer; font-size: 1.2rem; transition: 0.2s;
        }
        .btn-delete-profile:hover { color: #d32f2f; }
        .btn-tool { cursor: pointer; padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; background: white; font-size: 0.8rem; font-weight: 600; }
        .loading-overlay { text-align: center; padding: 3rem; color: #999; }

        /* ── PLAN COMPORTAMENT MODAL ── */
        #behaviorModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 99999;
            flex-direction: column;
            background: rgba(30,20,15,0.72);
        }
        #behaviorModal.open { display: flex; }

        .bm-navbar {
            background: #3e2723; height: 48px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 14px; gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35); flex-shrink: 0;
        }
        .bm-navbar-left { display: flex; align-items: center; gap: 6px; }
        .bm-navbar-right { display: flex; align-items: center; gap: 6px; }
        .bm-btn {
            background: rgba(255,255,255,0.13); color: white; border: none;
            padding: 5px 13px; border-radius: 5px; cursor: pointer;
            font-family: 'Quicksand', 'Cormorant Garamond', sans-serif;
            font-weight: 700; font-size: 0.8rem; display: inline-flex;
            align-items: center; gap: 4px; transition: 0.15s;
        }
        .bm-btn:hover { background: rgba(255,255,255,0.26); }
        .bm-btn.save { background: #2e7d32; }
        .bm-btn.save:hover { background: #1b5e20; }
        .bm-btn.pdf  { background: #5d4037; }
        .bm-btn.pdf:hover  { background: #4e342e; }
        .bm-title { color: rgba(255,255,255,0.75); font-size: 0.85rem; font-weight: 700; margin-left: 6px; }

        .bm-fmtbar {
            background: #faf7f3; border-bottom: 1px solid #ddd5c8;
            padding: 5px 10px; display: flex; align-items: center; flex-wrap: wrap;
            gap: 2px; flex-shrink: 0;
        }
        .bm-sep { width: 1px; height: 22px; background: #ccc; margin: 0 4px; flex-shrink: 0; }
        .bm-fb {
            background: none; border: 1px solid transparent; border-radius: 3px;
            padding: 3px 7px; cursor: pointer; font-size: 0.8rem; color: #3e2723;
            font-family: inherit; transition: 0.12s;
            display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
        }
        .bm-fb:hover { background: #ede8e2; border-color: #c9bbae; }
        .bm-fsel {
            border: 1px solid #ccc; border-radius: 3px; padding: 3px 5px;
            font-size: 0.8rem; background: white; color: #3e2723; cursor: pointer;
        }
        .bm-clr { position: relative; width: 26px; height: 26px; border-radius: 4px; overflow: hidden; border: 1px solid #ccc; }
        .bm-clr input[type=color] { position: absolute; top: -4px; left: -4px; width: 38px; height: 38px; border: none; padding: 0; cursor: pointer; background: none; }
        .bm-lbl { font-size: 0.7rem; color: #999; padding: 0 2px; }

        /* ZONA DE SCROLL — ocupa tot spatiul ramas */
        .bm-doczone {
            flex: 1;
            overflow-y: scroll;
            overflow-x: auto;
            background: #e0dbd5;
            padding: 32px 20px 80px;
            display: block;       /* NU flex — ca foaia sa nu fie fortata la inaltimea zonei */

        /* FOAIA — se centreaza si creste liber cu continutul */
        .bm-paper {

            width: 100%;
            max-width: 794px;

            padding: 60px 72px 80px;
            box-sizing: border-box;

        .bm-paper h1 { font-size: 18pt; text-align: center; text-transform: uppercase; margin: 18px 0 12px; font-family: 'Times New Roman', serif; letter-spacing: 0.03em; }
        .bm-paper h2 { font-size: 14pt; margin: 22px 0 10px; border-bottom: 2px solid #81a473; padding-bottom: 5px; color: #3e2723; font-family: 'Times New Roman', serif; }

        .bm-paper p  { margin: 7px 0; }
        .bm-paper table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 11pt; table-layout: fixed; }
        .bm-paper table td, .bm-paper table th { border: 1px solid #888; padding: 9px 11px; vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; }

            @page { margin: 0; size: A4; }

            .bm-paper { padding: 30px 20px 40px; }

    <main class="admin-container">
        <h1>Administrare Copii și Părinți</h1>
        <p>Creează un profil nou pentru copil și generează automat contul părintelui.</p>

        <section class="form-card">
            <h2>Adaugă Copil Nou</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label>Nume Copil</label>
                    <input type="text" id="childName" placeholder="Ex: Andrei Popescu">
                </div>
                <div class="input-group">
                    <label>Vârstă</label>
                    <input type="number" id="childAge" placeholder="Ex: 5">
                </div>
                <div class="input-group">
                    <label>Email Părinte</label>
                    <input type="email" id="parentEmail" placeholder="parinte@email.com">
                </div>
                <div class="input-group">
                    <label>Parolă Părinte</label>
                    <input type="text" id="parentPass" placeholder="parola123">
                </div>
            </div>
            <button class="btn-cta" onclick="addPatient()">Creează Profil și Cont</button>
        </section>

        <h2>Lista Copiilor</h2>
        <div class="patient-list" id="patientsContainer">
            <div class="loading-overlay">Se încarcă...</div>
        </div>
    </main>

<script>
    // ============================================================
    // CONFIGURARE SUPABASE
    // ============================================================
    const SUPABASE_URL = 'https://yexvpbgkrzerkizscgfn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_q52fh6Xa3yNm3q0akTrKKw_7AlxLrCU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Verifică sesiune
    const session = JSON.parse(sessionStorage.getItem('session') || 'null');
    if (!session || session.role !== 'psiholog') { window.location.href = "index.html"; }

    // ============================================================
    // ÎNCĂRCARE PACIENȚI
    // ============================================================
    async function loadPatients() {
        const container = document.getElementById("patientsContainer");
        const { data: patients, error } = await _supabase
            .from('patients')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            container.innerHTML = '<div class="loading-overlay">Eroare la încărcare. Verifică configurarea Supabase.</div>';
            console.error(error);
            return;
        }

        container.innerHTML = "";
        if (!patients || patients.length === 0) {
            container.innerHTML = '<div class="loading-overlay">Nu există pacienți adăugați încă.</div>';
            return;
        }

        patients.forEach(p => {
            const photo = p.photo || 'https://via.placeholder.com/60?text=...';
            container.innerHTML += `
                <div class="patient-card" id="card-${p.id}">
                    <button class="btn-delete-profile" onclick="deletePatient('${p.id}')" title="Șterge Profil">🗑️</button>
                    <div class="profile-section">
                        <div class="avatar-circle" onclick="document.getElementById('file-${p.id}').click()">
                            <img src="${photo}" id="img-${p.id}">
                        </div>
                        <input type="file" id="file-${p.id}" style="display:none" accept="image/*" onchange="uploadPhoto(event, '${p.id}')">
                        <div>
                            <h3>${p.name}</h3>
                            <div class="info-row">Vârstă: ${p.age} ani</div>
                        </div>
                    </div>
                    <div class="info-row"><strong>Email:</strong> ${p.email}</div>
                    <div class="info-row"><strong>Parolă:</strong> <span class="pass-display">${p.pass}</span></div>
                    <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
                        <button class="btn-tool" onclick="window.location.href='fisa-individuala.html?id=${p.id}'">Fișă de notare</button>
                        <button class="btn-tool" style="border-color: #795548; color: #795548;" 
                                onclick="window.location.href='documente-parinte.html?edit=true&id=${p.id}'">
                            Scrie Raport
                        </button>
                        <button class="btn-tool" style="border-color: #5c6bc0; color: #5c6bc0; background: #f3f4fc;"
                                onclick="openBehaviorPlan('${p.id}', '${p.name.replace(/'/g, "\\'")}')">
                            🧩 Plan Comportament
                        </button>
                    </div>
                </div>
            `;
        });
    }

    // ============================================================
    // ADAUGĂ PACIENT
    // ============================================================
async function addPatient() {
    const name = document.getElementById("childName").value.trim();
    const age = document.getElementById("childAge").value;
    const email = document.getElementById("parentEmail").value.trim().toLowerCase();
    const pass = document.getElementById("parentPass").value.trim();

    if (!name || !age || !email || !pass) {
        showToast("Completează toate câmpurile!", "❌");
        return;
    }

    // 1. Adaugă părintele în users
    const { error: userErr } = await _supabase
        .from('users')
        .insert([{ email, password: pass, role: 'parinte' }]);

    if (userErr) {
        showToast("Eroare: emailul există deja sau altă problemă: " + userErr.message, "❌");
        return;
    }

    // 2. Adaugă copilul în patients
    const { error: patientErr } = await _supabase
        .from('patients')
        .insert([{ name, age: parseInt(age), email, pass, photo: null }]);

    if (patientErr) {
        showToast("Eroare la salvare pacient: " + patientErr.message, "❌");
        return;
    }

    // Reset form
    document.getElementById("childName").value = '';
    document.getElementById("childAge").value = '';
    document.getElementById("parentEmail").value = '';
    document.getElementById("parentPass").value = '';

    showToast("Profil și cont create cu succes!");
    loadPatients();
}

    // ============================================================
    // UPLOAD POZĂ
    // ============================================================
    async function uploadPhoto(event, patientId) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onloadend = async function() {
            const base64 = reader.result;
            await _supabase
                .from('patients')
                .update({ photo: base64 })
                .eq('id', patientId);
            document.getElementById(`img-${patientId}`).src = base64;
            showToast("Poza a fost salvată!");
        };
        if (file) reader.readAsDataURL(file);
    }

    // ============================================================
    // ȘTERGE PACIENT → ARHIVARE COMPLETĂ ÎNAINTE DE ȘTERGERE
    // ============================================================
    async function deletePatient(patientId) {
        if (!confirm("Profilul va fi mutat în Arhivă (nu șters definitiv). Continui?")) return;

        showToast("Se arhivează datele...", "📦");

        // 1. Citim datele pacientului
        const { data: patient } = await _supabase
            .from('patients').select('*').eq('id', patientId).single();

        if (!patient) { showToast("Eroare: pacientul nu a fost găsit.", "❌"); return; }

        // 2. Citim fișa de notare
        const { data: fisa } = await _supabase
            .from('fisa_data').select('data').eq('patient_id', patientId).maybeSingle();

        // 3. Citim raportul
        const { data: raport } = await _supabase
            .from('reports').select('content').eq('patient_id', patientId).maybeSingle();

        // 4. Citim planul de intervenție
        const { data: plan } = await _supabase
            .from('intervention_plans').select('html_content').eq('patient_id', patientId).maybeSingle();

        // 5. Salvăm totul în tabelul de arhivă
        const archivePayload = {
            original_patient_id: patientId,
            name: patient.name,
            age: patient.age,
            email: patient.email,
            pass: patient.pass,
            photo: patient.photo,
            fisa_data: fisa ? fisa.data : [],
            report_content: raport ? raport.content : null,
            plan_html: plan ? plan.html_content : null,
            archived_at: new Date().toISOString()
        };

        const { error: archErr } = await _supabase
            .from('archived_patients')
            .insert([archivePayload]);

        if (archErr) {
            showToast("Eroare la arhivare: " + archErr.message + " — asigură-te că tabelul 'archived_patients' există în Supabase.", "❌");
            return;
        }

        // 6. Ștergem pacientul (cascade va șterge fisa_data, reports, intervention_plans)
        const { error: delErr } = await _supabase
            .from('patients').delete().eq('id', patientId);

        if (delErr) {
            showToast("Arhivat, dar eroare la ștergere: " + delErr.message, "⚠️");
            return;
        }

        showToast("Profil arhivat cu succes! Îl găsești în secțiunea 🗄️ Arhivă.", "✅");
        loadPatients();
    }

    function logout() { sessionStorage.removeItem('session'); window.location.href = "index.html"; }

    function showToast(message, icon = "✅") {
        let toast = document.getElementById('customToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.className = 'custom-notification';
            document.body.appendChild(toast);
        }
        toast.innerHTML = `<span class="notification-icon">${icon}</span> ${message}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    loadPatients();
</script>

<script>
    // ═══════════════════════════════════════════════
    // PLAN COMPORTAMENT — variabile globale
    // ═══════════════════════════════════════════════
    let bmPatientId = null;
    let bmPatientName = '';
    let bmPlanId = null;   // id-ul rândului din tabel behavior_plans

    // ───────────────────────────────────────────────
    // Deschide modalul pentru un pacient
    // ───────────────────────────────────────────────
    async function openBehaviorPlan(patientId, patientName) {
        bmPatientId = patientId;
        bmPatientName = patientName;
        bmPlanId = null;

        document.getElementById('bmTitle').textContent = 'Plan Comportament — ' + patientName;
        document.getElementById('behaviorModal').classList.add('open');

        const paper = document.getElementById('bmPaper');
        paper.innerHTML = '<p style="text-align:center;color:#999;">Se încarcă...</p>';

        // Caută plan existent
        const { data: existing } = await _supabase
            .from('behavior_plans')
            .select('*')
            .eq('patient_id', patientId)
            .maybeSingle();

        if (existing && existing.html_content) {

    // ───────────────────────────────────────────────
    // Salvare în Supabase (tabel behavior_plans)
    // ───────────────────────────────────────────────
    async function saveBehaviorPlan() {
        const paper = document.getElementById('bmPaper');
        const html = paper.innerHTML;
        if (!bmPatientId) { showToast('Eroare: niciun pacient selectat.', '❌'); return; }

        showToast('Se salvează...', '⏳');

        try {
            if (bmPlanId) {
                // UPDATE
                const { error } = await _supabase
                    .from('behavior_plans')
                    .update({ html_content: html, updated_at: new Date().toISOString() })
                    .eq('id', bmPlanId);
                if (error) throw error;
            } else {
                // INSERT
                const { data, error } = await _supabase
                    .from('behavior_plans')
                    .insert([{ patient_id: bmPatientId, html_content: html }])
                    .select('id')
                    .single();
                if (error) throw error;
                if (data) bmPlanId = data.id;
            }
            showToast('Plan comportament salvat cu succes! ✅');
        } catch (err) {
            console.error('Eroare salvare behavior_plans:', err);
            showToast('Eroare la salvare: ' + (err.message || JSON.stringify(err)), '❌');
        }
    }

    // ───────────────────────────────────────────────
    // Editor helper functions
    // ───────────────────────────────────────────────
    function bmEx(cmd, val) {
        document.execCommand(cmd, false, val || null);
        document.getElementById('bmPaper').focus();
    }
    function bmBlk(tag) {
        if (!tag) return;
        document.execCommand('formatBlock', false, tag);
        document.getElementById('bmPaper').focus();
    }
    function bmNearestTag(tag) {
        const sel = window.getSelection();
        if (!sel || !sel.anchorNode) return null;
        let node = sel.anchorNode;
        const paper = document.getElementById('bmPaper');
        while (node && node !== paper) { if (node.nodeName === tag) return node; node = node.parentNode; }
        return null;
    }
    function bmFocusCell(el) {
        if (!el) return;
        el.focus();
        const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
        const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
    }
    function bmInsertTable() {
        const cols = parseInt(prompt('Câte coloane?', '3') || '3');
        const rows = parseInt(prompt('Câte rânduri (fără header)?', '3') || '3');
        if (!cols || !rows) return;
        let h = '<table><thead><tr>';
        for (let c = 0; c < cols; c++) h += '<th>Coloana ' + (c + 1) + '</th>';
        h += '</tr></thead><tbody>';
        for (let r = 0; r < rows; r++) { h += '<tr>'; for (let c = 0; c < cols; c++) h += '<td>&nbsp;</td>'; h += '</tr>'; }
        h += '</tbody></table><p><br></p>';
        bmEx('insertHTML', h);
    }
    function bmAddRow() {
        const cell = bmNearestTag('TD') || bmNearestTag('TH');
        if (!cell) { showToast('Pune cursorul într-o celulă.', 'ℹ️'); return; }
        const row = cell.closest('tr');
        const cols = row.querySelectorAll('td,th').length;
        const nr = document.createElement('tr');
        for (let i = 0; i < cols; i++) { const td = document.createElement('td'); td.innerHTML = '&nbsp;'; nr.appendChild(td); }
        row.after(nr); bmFocusCell(nr.querySelector('td'));
    }
    function bmAddCol() {
        const cell = bmNearestTag('TD') || bmNearestTag('TH');
        if (!cell) { showToast('Pune cursorul într-o celulă.', 'ℹ️'); return; }
        const table = cell.closest('table');
        table.querySelectorAll('tr').forEach(row => {
            const cells = [...row.querySelectorAll('td,th')];
            const idx = cells.indexOf(cell) !== -1 ? cells.indexOf(cell) : cells.length - 1;
            const nc = row.querySelector('th') ? document.createElement('th') : document.createElement('td');
            nc.innerHTML = '&nbsp;';
            cells[idx + 1] ? row.insertBefore(nc, cells[idx + 1]) : row.appendChild(nc);
        });
    }
    function bmDelRow() {
        const cell = bmNearestTag('TD') || bmNearestTag('TH');
        if (!cell) return;
        cell.closest('tr').remove();
    }
    function bmDelCol() {
        const cell = bmNearestTag('TD') || bmNearestTag('TH');
        if (!cell) return;
        const table = cell.closest('table');
        const cells = [...cell.closest('tr').querySelectorAll('td,th')];
        const idx = cells.indexOf(cell);
        table.querySelectorAll('tr').forEach(row => {
            const rc = [...row.querySelectorAll('td,th')];
            if (rc[idx]) rc[idx].remove();
        });
    }

    // ───────────────────────────────────────────────
    // Export PDF complet (toate paginile, nu doar ecranul)
    // ───────────────────────────────────────────────
    async function exportBehaviorPDF() {
        const paper = document.getElementById('bmPaper');
        const btn = document.querySelector('.bm-btn.pdf');
        btn.textContent = '⏳ Se generează...';
        btn.disabled = true;

        const safeName = (bmPatientName || 'plan').replace(/[^a-zA-Z0-9_\- ]/g, '').trim() || 'plan';
        const fileName = `Plan_Comportament_${safeName}.pdf`;

        const opt = {
            margin:       [15, 15, 15, 15],   // mm: top, left, bottom, right
            filename:     fileName,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        try {
            await html2pdf().set(opt).from(paper).save();
        } catch(e) {
            showToast('Eroare la generarea PDF: ' + e.message, '❌');
        }

        btn.textContent = '🖨️ PDF';
        btn.disabled = false;
    }
